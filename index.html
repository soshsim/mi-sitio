<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mi lugar en internet</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fade 2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      opacity: 0.7;
      font-size: 1.1rem;
    }

    .dot {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 10s linear infinite;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
      }

      to {
        transform: translateY(-100vh);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>hola internet</h1>
    <p>este sitio simplemente existe.</p>
  </div>

  <script>
    for(let i = 0; i < 50; i++) {
      const dot = document.createElement('div');

      dot.classList.add('dot');

      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.animationDuration =
        (5 + Math.random() * 10) + 's';

      dot.style.opacity = Math.random();

      document.body.appendChild(dot);
    }
  </script>

</body>
</html>
